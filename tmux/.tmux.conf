# ==========================
# 1. CẤU HÌNH CƠ BẢN
# ==========================
# Đổi phím Prefix từ Ctrl+b (mặc định) sang Ctrl+a (dễ bấm hơn nhiều)
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# Bắt đầu đánh số Window và Pane từ 1 (thay vì 0, khớp với bspwm)
set -g base-index 1
setw -g pane-base-index 1

# Bật chuột (hỗ trợ cuộn log, click chọn pane và kéo thả kích thước)
set -g mouse on

# Phím tắt để reload nhanh file cấu hình (Prefix + r)
bind r source-file ~/.tmux.conf \; display-message "Đã reload ~/.tmux.conf!"

# Tăng dung lượng lưu trữ lịch sử terminal lên 10,000 dòng
set -g history-limit 10000

# ==========================
# 2. QUẢN LÝ PLUGIN
# ==========================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible' # Các thiết lập mặc định tối ưu
set -g @plugin 'tmux-plugins/tmux-resurrect' # Lưu trạng thái các cửa sổ
set -g @plugin 'tmux-plugins/tmux-continuum' # Tự động lưu ngầm mỗi 15 phút
set -g @plugin 'catppuccin/tmux'
# Cấu hình Catppuccin Theme
set -g @catppuccin_flavour 'mocha' # Các màu: latte, frappe, macchiato, mocha
set -g @catppuccin_window_right_separator "█ "
set -g @catppuccin_window_number_position "right"
set -g @catppuccin_window_middle_separator " | "
set -g @catppuccin_window_default_fill "none"
set -g @catppuccin_window_current_fill "all"
set -g @catppuccin_status_modules_right "application session user date_time"
set -g @catppuccin_status_left_separator "█"
set -g @catppuccin_status_right_separator "█"

# Bật tính năng tự động khôi phục môi trường làm việc khi mở tmux
set -g @continuum-restore 'on'

# ==========================
# 3. KHỞI CHẠY TPM 
# (Dòng này bắt buộc phải nằm ở cuối file)
# ==========================
run '~/.tmux/plugins/tpm/tpm'

# ==========================
# CẤU HÌNH STATUS BAR (THỦ CÔNG)
# ==========================
# Đặt vị trí thanh status ở trên cùng (top) hoặc dưới cùng (bottom)
set-option -g status-position bottom

# Cập nhật thông tin mỗi 1 giây (mặc định là 15s)
set -g status-interval 1

# Màu nền và màu chữ tổng thể của thanh status (Nền xám đậm, chữ trắng)
set -g status-bg "#1e1e2e"
set -g status-fg "#cdd6f4"

# --- Phần bên TRÁI (Hiển thị tên Session) ---
set -g status-left-length 40
set -g status-left "#[fg=#1e1e2e,bg=#89b4fa,bold]  #S #[bg=#1e1e2e,fg=#89b4fa]"

# --- Phần ở GIỮA (Danh sách Window) ---
# Window không hoạt động
set -g window-status-format "#[fg=#6c7086,bg=#1e1e2e] #I:#W "
# Window ĐANG hoạt động (Đổi màu nổi bật)
set -g window-status-current-format "#[fg=#1e1e2e,bg=#a6e3a1,bold] #I:#W #[bg=#1e1e2e,fg=#a6e3a1]"

# --- Phần bên PHẢI (Giờ giấc & User) ---
set -g status-right-length 100
set -g status-right "#[fg=#f9e2af,bg=#1e1e2e]  %H:%M:%S #[fg=#1e1e2e,bg=#f38ba8,bold] %d/%m/%Y "


