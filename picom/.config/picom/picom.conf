# =========================================================
# 1. BACKEND & PERFORMANCE (Tối ưu Intel UHD)
# =========================================================
backend = "glx";
vsync = true;
use-damage = false;
xrender-sync-fence = true;
unredir-if-possible = false;

# =========================================================
# 2. SHADOWS (Đổ bóng cửa sổ)
# =========================================================
shadow = true;
shadow-radius = 28;
shadow-opacity = 0.18;
shadow-offset-x = 0;
shadow-offset-y = 8;

shadow-exclude = [
  "class_g = 'Rofi'",
  "class_g = 'Dunst'",
  "_GTK_FRAME_EXTENTS@:c"
];

# =========================================================
# 3. OPACITY & BLUR (Trong suốt & Bỏ qua làm mờ Polybar)
# =========================================================
active-opacity = 1.0;
inactive-opacity = 0.9;
frame-opacity = 1.0;
inactive-opacity-override = true;

detect-client-opacity = true;
detect-transient = true;

# Bổ sung: Loại trừ Polybar khỏi hiệu ứng làm mờ
blur-background-exclude = [
];

opacity-rule = [
  "90:class_g = 'Code' && !focused",          # VS Code (Tên class thường là Code)
  "100:class_g = 'Code' && focused",
  "90:class_g = 'Google-chrome' && !focused", # Chrome (Chữ G viết hoa)
  "100:class_g = 'Google-chrome' && focused",
  "90:class_g = 'Thunar' && !focused",
  "100:class_g = 'Thunar' && focused",
  "80:class_g = 'Alacritty' && !focused",
  "100:class_g = 'Alacritty' && focused",
  "95:class_g = 'code' && !focused",     
  "100:class_g = 'code' && focused",
  "90:class_g = 'Org.gnome.gThumb' && !focused",     
  "100:class_g = 'Org.gnome.gThumb' && focused",
];

use-ewmh-active-win = true;
# =========================================================
# 4. FADING (Đã tắt để nhường chỗ cho hệ thống Animation mới)n
# =========================================================
# =========================================================
# 4. FADING (Bắt buộc bật để làm bước đệm cho Animation Đóng)
# =========================================================
fading = true;

# Tốc độ fade cần đủ chậm để Picom kịp vẽ hiệu ứng zoom
fade-in-step = 0.03;
fade-out-step = 0.03;

fade-delta = 5;
no-fading-openclose = false;

# =========================================================
# 5. ANIMATIONS (Hiệu ứng Zoom vật lý mượt mà)
# Yêu cầu: Đã cài gói 'picom-ftlabs-git'
# =========================================================
animations = true;

# Hệ thống lò xo vật lý (Tạo độ nảy tự nhiên)
animation-stiffness = 300.0;
animation-dampening = 22.0;
animation-clamping = true;
animation-mass = 1.0;

# Cấu hình Zoom cho mọi tương tác
animation-for-open-window = "zoom";
animation-for-unmap-window = "zoom";
animation-for-workspace-switch-in = "zoom";
animation-for-workspace-switch-out = "zoom";
animation-for-transient-window = "zoom";

# =========================================================
# 6. FOCUS & BORDERS
# =========================================================
mark-wmwin-focused = true;
mark-ovredir-focused = true;
detect-rounded-corners = true;

# =========================================================
# 7. WINDOW TYPES (Quy tắc cho các loại cửa sổ cụ thể)
# =========================================================
wintypes:
{
  tooltip = {
    fade = false;
    shadow = false;
    opacity = 0.90;
  };

  desktop = {
    shadow = false;
  };

  dock = {
    animation = "zoom";    # Sử dụng hiệu ứng nảy từ tâm
    fade = true;           # Kết hợp fade để xuất hiện mượt hơn
    shadow = true;
  };
  
  menu = {
    opacity = 0.95;
  };

  popup_menu = {
    opacity = 0.95;
  };

  dropdown_menu = {
    opacity = 0.95;
  };
};

# =========================================================
# 8. ROUNDED CORNERS (Bo góc cửa sổ)
# =========================================================
# Độ cong của góc (8-10 là bo nhẹ, 15-20 là bo tròn hẳn)
corner-radius = 13;

# Ép bspwm vẽ viền bo theo góc cửa sổ (rất quan trọng để viền không bị móp)
round-borders = 1;

# Loại trừ bo góc cho các thành phần không cần thiết
rounded-corners-exclude = [
  "window_type = 'dock'",      # Không bo góc thanh dock
  "window_type = 'desktop'",   # Không bo góc màn hình nền
  "class_g = 'Polybar'",       # Polybar đã tự bo góc trong file của nó
  "name = 'Notification'",     # Không bo các thông báo pop-up nếu bị lỗi
];