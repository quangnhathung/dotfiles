[module/user]
type = custom/script
exec = whoami

; Không cần update liên tục vì tên user không đổi trong phiên làm việc
interval = 1024

; Icon User (Nerd Font)
format-prefix = " "
; Dùng màu primary (xanh/tím tùy bộ màu bạn đang dùng) cho icon
format-prefix-foreground = ${colors.primary}

label = %output%
label-foreground = ${colors.foreground}
label-padding-left = 1