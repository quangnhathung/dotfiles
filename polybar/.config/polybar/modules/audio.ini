[module/pulseaudio]
type = internal/pulseaudio

; Bật tính năng click để mute/unmute trực tiếp trên thanh bar
use-ui-max = false

; --- Trạng thái đang có tiếng ---
; Icon loa (Nerd Font)
format-volume = <ramp-volume> <label-volume>
label-volume = %percentage%%
label-volume-foreground = ${colors.foreground}

; --- Trạng thái bị tắt tiếng (Mute) ---
format-muted = <label-muted>
format-muted-prefix = "󰝟 "
format-muted-prefix-foreground = #F38BA8
label-muted = Muted
label-muted-foreground = #6C7086

; --- Hiệu ứng icon tự đổi theo mức âm lượng ---
ramp-volume-0 = ""
ramp-volume-1 = ""
ramp-volume-2 = ""
ramp-volume-foreground = ${colors.primary}

; Các hành động khi click chuột vào module trên bar
click-right = pavucontrol