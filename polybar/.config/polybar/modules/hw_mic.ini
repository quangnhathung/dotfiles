; ================================
; MODULE CPU (Nội bộ)
; ================================
[module/cpu]
type = internal/cpu
interval = 2
format = <label>
format-prefix = " "
format-prefix-foreground = ${colors.primary}
label = %percentage:2%%

; ================================
; MODULE GPU (Tùy chỉnh cho Intel)
; ================================
[module/gpu]
[module/gpu]
type = custom/script
exec = ~/.config/polybar/scripts/gpu.sh
; Cập nhật mỗi 2 giây
interval = 2
format = <label>
; Xóa format-prefix cũ vì script đã tự render tên GPU rất đẹp rồi
label = %output%

; ================================
; MODULE TRẠNG THÁI MIC (Tự động ẩn/hiện)
; ================================
[module/mic-status]
type = custom/script
exec = ~/.config/polybar/scripts/mic.sh
; Quét trạng thái mỗi 1 giây để phản hồi nhanh
interval = 1
format = <label>
label = %output%